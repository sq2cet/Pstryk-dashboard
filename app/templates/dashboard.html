{% extends "base.html" %}

{% block content %}
<section class="card live-card"
         hx-get="/partials/live"
         hx-trigger="load, every 5s"
         hx-swap="innerHTML">
  <div class="muted">loading live reading…</div>
</section>

<section class="card chart-card">
  <header class="chart-header">
    <h2>Last 24 h price &amp; consumption</h2>
    <span class="muted small">forecast next 24 h on the right</span>
  </header>
  <div class="chart-wrap">
    <canvas id="chart-hourly" aria-label="Hourly price and consumption"></canvas>
  </div>
</section>

<script src="{{ url_for('static', path='js/charts.js') }}" defer></script>
{% endblock %}
