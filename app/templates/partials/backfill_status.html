{# Visible only while the historical-data download is running. #}
<div class="banner banner--{% if status == 'failed' %}warn{% else %}ok{% endif %} banner-progress">
  <div>
    <strong>{% if status == 'failed' %}⚠ Download error{% else %}⏳ Downloading historical data{% endif %}</strong>
    <div class="muted small">{{ message }}</div>
  </div>
  {% if status == 'running' %}
  <div class="muted small">
    {{ rows }} hour(s) · {{ chunks }} chunk(s)
  </div>
  {% endif %}
</div>
